name: Android Release

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Build and publish APKs
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::8}"
          release_name="vFlow_${short_sha}"
          release_tag="ci-${short_sha}"
          echo "short_sha=${short_sha}" >> "${GITHUB_OUTPUT}"
          echo "release_name=${release_name}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"

      - name: Restore release signing files
        shell: bash
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [[ -n "${ENCODED_KEYSTORE}" ]]; then
            echo "${ENCODED_KEYSTORE}" | base64 --decode > vFlow.jks
            {
              echo "KEYSTORE_PASSWORD=${KEYSTORE_PASSWORD}"
              echo "KEYSTORE_ALIAS=${KEYSTORE_ALIAS}"
              echo "KEY_PASSWORD=${KEY_PASSWORD}"
            } > signing.properties
          else
            echo "Release signing secrets not configured; release APKs will use the unsigned/default path."
          fi

      - name: Restore local debug signing files
        shell: bash
        env:
          ENCODED_DEBUG_KEYSTORE: ${{ secrets.DEBUG_KEYSTORE }}
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEYSTORE_ALIAS: ${{ secrets.DEBUG_KEYSTORE_ALIAS }}
          DEBUG_KEY_PASSWORD: ${{ secrets.DEBUG_KEY_PASSWORD }}
        run: |
          if [[ -n "${ENCODED_DEBUG_KEYSTORE}" ]]; then
            echo "${ENCODED_DEBUG_KEYSTORE}" | base64 --decode > debug.keystore
            {
              echo "KEYSTORE_PASSWORD=${DEBUG_KEYSTORE_PASSWORD:-android}"
              echo "KEYSTORE_ALIAS=${DEBUG_KEYSTORE_ALIAS:-androiddebugkey}"
              echo "KEY_PASSWORD=${DEBUG_KEY_PASSWORD:-android}"
            } > debug-signing.properties
          elif [[ -f debug.keystore ]]; then
            echo "Using repository debug.keystore"
          else
            echo "Custom debug keystore not configured; debug APKs will use the runner default debug signing."
          fi

      - name: Build APKs
        run: ./gradlew --stacktrace :app:assembleDebug :app:assembleRelease

      - name: Rotate-sign debug APKs for legacy debug users
        id: rotate_debug
        shell: bash
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          RELEASE_KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [[ ! -f vFlow.jks || ! -f signing.properties ]]; then
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "Release signing inputs are incomplete; skipping rotated APK generation."
            exit 0
          fi

          old_keystore=""
          if [[ -f debug.keystore ]]; then
            old_keystore="debug.keystore"
          elif [[ -f "${HOME}/.android/debug.keystore" ]]; then
            old_keystore="${HOME}/.android/debug.keystore"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "No debug keystore found for migration; skipping rotated APK generation."
            exit 0
          fi

          old_store_pass="${DEBUG_KEYSTORE_PASSWORD:-android}"
          old_alias="${DEBUG_KEYSTORE_ALIAS:-androiddebugkey}"
          old_key_pass="${DEBUG_KEY_PASSWORD:-android}"

          chmod +x ./scripts/signing/rotate_sign_apks.sh
          ./scripts/signing/rotate_sign_apks.sh \
            --apk-dir app/build/outputs/apk/debug \
            --out-dir app/build/outputs/apk/legacy-compatible-debug \
            --lineage signing/debug-to-release-lineage.bin \
            --skip-lineage-create \
            --old-keystore "${old_keystore}" \
            --old-alias "${old_alias}" \
            --old-store-pass "${old_store_pass}" \
            --old-key-pass "${old_key_pass}" \
            --new-keystore vFlow.jks \
            --new-alias "${RELEASE_KEYSTORE_ALIAS}" \
            --new-store-pass "${RELEASE_KEYSTORE_PASSWORD}" \
            --new-key-pass "${RELEASE_KEY_PASSWORD}" \
            --rotation-min-sdk 29 \
            --verify-min-sdk 29 \
            --in-place

          echo "enabled=true" >> "${GITHUB_OUTPUT}"

      - name: Collect release assets
        id: collect_apks
        shell: bash
        run: |
          mkdir -p release-assets
          if [[ "${{ steps.rotate_debug.outputs.enabled }}" == "true" ]]; then
            find app/build/outputs/apk/legacy-compatible-debug -type f -name "*.apk" -exec cp "{}" release-assets/ \;
          else
            find app/build/outputs/apk/debug -type f -name "*.apk" ! -name "*-androidTest.apk" -exec cp "{}" release-assets/ \;
          fi

          find app/build/outputs/apk/release -type f -name "*.apk" -exec cp "{}" release-assets/ \;

          mapping_path="app/build/outputs/mapping/release/mapping.txt"
          mapping_asset="release-assets/${{ steps.meta.outputs.release_name }}_release_mapping.txt"
          if [[ -f "${mapping_path}" ]]; then
            cp "${mapping_path}" "${mapping_asset}"
          else
            echo "Release mapping file was not produced: ${mapping_path}" >&2
            exit 1
          fi

          apk_count=$(find release-assets -maxdepth 1 -type f -name "*.apk" | wc -l | tr -d ' ')
          echo "apk_count=${apk_count}" >> "${GITHUB_OUTPUT}"

          if [[ "${apk_count}" == "0" ]]; then
            echo "No APKs were produced." >&2
            exit 1
          fi

          ls -1 release-assets

      - name: Publish draft prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.release_name }}
          body: |
            Commit: `${{ github.sha }}`
            Branch: `${{ github.ref_name }}`
          draft: true
          prerelease: true
          files: |
            release-assets/*.apk
            release-assets/*_release_mapping.txt
          fail_on_unmatched_files: true
          make_latest: false
